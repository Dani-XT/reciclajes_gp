<section
	id="parallax-two"
	data-parallax-section
	class="relative min-h-screen overflow-hidden bg-[#dff7ff] pt-24 dark:bg-zinc-950"
>

	<!-- CAPAS PARALLAX -->
	<div class="absolute inset-0 z-0 overflow-hidden">

		<!-- Capa 1 - Fondo lejano -->
		<img
			appParallaxTwo
			[scrollSpeed]="0.03"
			[mouseSpeed]="3"
			[maxMovement]="45"
			[layerScale]="1.08"
			src="assets/parallax/fondo-lejano.png"
			alt=""
			aria-hidden="true"
			class="absolute inset-0 h-full w-full object-cover object-center"
		/>

		<!-- Capa 2 - Fondo medio -->
		<img
			appParallaxTwo
			[scrollSpeed]="0.08"
			[mouseSpeed]="8"
			[maxMovement]="70"
			[layerScale]="1.1"
			src="assets/parallax/fondo-medio.png"
			alt=""
			aria-hidden="true"
			class="absolute inset-0 h-full w-full object-cover object-center"
		/>

		<!-- Capa 3 - Escena principal -->
		<img
			appParallaxTwo
			[scrollSpeed]="0.18"
			[mouseSpeed]="14"
			[maxMovement]="120"
			[layerScale]="1.15"
			src="assets/parallax/escena-principal.png"
			alt=""
			aria-hidden="true"
			class="absolute inset-0 h-full w-full object-cover object-center"
		/>

		<!-- Capa 4 - Primer plano -->
		<img
			appParallaxTwo
			[scrollSpeed]="0.32"
			[mouseSpeed]="24"
			[maxMovement]="180"
			[layerScale]="1.22"
			src="assets/parallax/primer-plano.png"
			alt=""
			aria-hidden="true"
			class="absolute inset-0 h-full w-full object-cover object-center"
		/>
