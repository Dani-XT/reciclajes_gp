<footer class="bg-zinc-950 text-white">
  <div class="mx-auto max-w-7xl px-6 py-16 sm:py-20 lg:px-8 lg:py-24">
    <div class="grid gap-12 xl:grid-cols-3 xl:gap-8">

      <!-- Marca / descripción -->
      <div class="space-y-8">
				
        <!-- Redes sociales -->
        <div class="flex items-center gap-5">
          <a
            href="https://www.facebook.com/"
            target="_blank"
            rel="noopener noreferrer"
            class="text-zinc-400 transition hover:text-lime-400"
            aria-label="Facebook"
          >
            <svg viewBox="0 0 24 24" fill="currentColor" class="size-6" aria-hidden="true">
              <path
                fill-rule="evenodd"
                clip-rule="evenodd"

              />
            </svg>
          </a>

          <a
            href="https://www.instagram.com/"
            target="_blank"
            rel="noopener noreferrer"
            class="text-zinc-400 transition hover:text-lime-400"
            aria-label="Instagram"
          >
            <svg viewBox="0 0 24 24" fill="currentColor" class="size-6" aria-hidden="true">
              <path
                fill-rule="evenodd"
                clip-rule="evenodd"
                d="M12.315 2c2.43 0 2.784.013 3.808.06 1.064.049 1.791.218 2.427.465a4.902 4.902 0 011.772 1.153 4.902 4.902 0 011.153 1.772c.247.636.416 1.363.465 2.427.048 1.067.06 1.407.06 4.123v.08c0 2.643-.012 2.987-.06 4.043-.049 1.064-.218 1.791-.465 2.427a4.902 4.902 0 01-1.153 1.772 4.902 4.902 0 01-1.772 1.153c-.636.247-1.363.416-2.427.465-1.067.048-1.407.06-4.123.06h-.08c-2.643 0-2.987-.012-4.043-.06-1.064-.049-1.791-.218-2.427-.465a4.902 4.902 0 01-1.772-1.153 4.902 4.902 0 01-1.153-1.772c-.247-.636-.416-1.363-.465-2.427-.047-1.024-.06-1.379-.06-3.808v-.63c0-2.43.013-2.784.06-3.808.049-1.064.218-1.791.465-2.427a4.902 4.902 0 011.153-1.772A4.902 4.902 0 015.45 2.525c.636-.247 1.363-.416 2.427-.465C8.901 2.013 9.256 2 11.685 2h.63zM12 6.865a5.135 5.135 0 100 10.27 5.135 5.135 0 000-10.27zm0 1.802a3.333 3.333 0 110 6.666 3.333 3.333 0 010-6.666zm5.338-3.205a1.2 1.2 0 100 2.4 1.2 1.2 0 000-2.4z"
              />
            </svg>
          </a>

          <a
            href="https://wa.me/569XXXXXXXX"
            target="_blank"
            rel="noopener noreferrer"
            class="text-zinc-400 transition hover:text-lime-400"
            aria-label="WhatsApp"
          >
            <svg viewBox="0 0 24 24" fill="currentColor" class="size-6" aria-hidden="true">
              <path
                fill-rule="evenodd"
                clip-rule="evenodd"
                d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.46 1.34 4.97L2 22l5.26-1.38a9.86 9.86 0 004.78 1.22h.01c5.46 0 9.91-4.45 9.91-9.91C21.96 6.45 17.51 2 12.04 2zm0 18.17h-.01a8.2 8.2 0 01-4.18-1.15l-.3-.18-3.12.82.83-3.04-.2-.31a8.23 8.23 0 01-1.26-4.4c0-4.55 3.7-8.25 8.25-8.25a8.2 8.2 0 018.25 8.25c0 4.55-3.7 8.26-8.25 8.26zm4.52-6.17c-.25-.12-1.47-.72-1.69-.8-.23-.08-.39-.12-.56.12-.16.25-.64.8-.78.96-.14.16-.29.18-.54.06-.25-.12-1.05-.39-2-1.24-.74-.66-1.24-1.47-1.38-1.72-.14-.25-.02-.38.11-.51.11-.11.25-.29.37-.43.12-.14.16-.25.25-.41.08-.16.04-.31-.02-.43-.06-.12-.56-1.35-.76-1.85-.2-.48-.4-.42-.56-.43h-.48c-.16 0-.43.06-.66.31-.23.25-.87.85-.87 2.07s.89 2.4 1.01 2.57c.12.16 1.75 2.67 4.25 3.75.59.26 1.06.41 1.42.52.6.19 1.14.16 1.57.1.48-.07 1.47-.6 1.68-1.18.21-.58.21-1.08.14-1.18-.06-.1-.23-.16-.48-.28z"
              />
            </svg>
          </a>
        </div>
      </div>

      <!-- Links -->
      <div class="grid grid-cols-2 gap-8 sm:grid-cols-4 xl:col-span-2">
        @for (section of sections; track section.title) {
          <div>
            <h3 class="text-sm font-semibold text-white">
              {{ section.title }}
            </h3>

            <ul role="list" class="mt-6 space-y-4">
              @for (link of section.links; track link.label) {
                <li>
                  @if (link.external) {
                    <a
                      [href]="link.href"
                      target="_blank"
                      rel="noopener noreferrer"
                      class="text-sm leading-6 text-zinc-400 transition hover:text-lime-400"
                    >
                      {{ link.label }}
                    </a>
                  } @else {
                    <a
                      [routerLink]="link.href"
                      class="text-sm leading-6 text-zinc-400 transition hover:text-lime-400"
                    >
                      {{ link.label }}
                    </a>
                  }
                </li>
              }
            </ul>
          </div>
        }
      </div>
    </div>

    <!-- Línea inferior -->
    <div class="mt-16 border-t border-white/10 pt-8 sm:mt-20 lg:mt-24">
      <p class="text-sm leading-6 text-zinc-400">
        © {{ year }} Reciclajes GP. Todos los derechos reservados.
      </p>
    </div>
  </div>
</footer>
