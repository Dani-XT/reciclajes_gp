<header class="gp-header" [class.menu-open]="isMenuOpen()">
  <nav class="gp-nav" aria-label="Navegación principal">

    <!-- LOGO -->
    <a href="#" class="gp-brand" aria-label="Ir al inicio" (click)="scrollToTop($event)">
      <span class="gp-logo-box">
        <img
          src="assets/logos/logo.png"
          alt="Logo Reciclajes GP"
          class="gp-logo dark:hidden"
        />

        <img
          src="assets/logos/logo-dark.png"
          alt="Logo Reciclajes GP"
          class="gp-logo hidden dark:block"
        />
      </span>

      <span class="gp-brand-text">
        <span class="gp-brand-name">
          RECICLAJES <strong>GP</strong>
        </span>

        <span class="gp-brand-slogan">
          Piensa en verde, recicla
        </span>
      </span>
    </a>

    <!-- NAV DESKTOP -->
    <div class="gp-desktop-links">
      <a href="#materiales" (click)="scrollToSection('materiales', $event)">Materiales</a>
      <a href="#servicios" (click)="scrollToSection('servicios', $event)">Servicios</a>
      <a href="#publicaciones" (click)="scrollToSection('publicaciones', $event)">Publicaciones</a>
      <a href="#contacto" (click)="scrollToSection('contacto', $event)">Contacto</a>
    </div>

    <!-- ACCIONES -->
    <div class="gp-actions">
      <app-theme-toggle></app-theme-toggle>

      <a
        [href]="whatsappUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="gp-whatsapp gp-whatsapp-desktop"
      >
        WhatsApp
      </a>

      <button
        type="button"
        class="gp-menu-button"
        [attr.aria-expanded]="isMenuOpen()"
        aria-controls="mobile-menu"
        aria-label="Abrir o cerrar menú"
        (click)="toggleMenu()"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- MENÚ MOBILE -->
  <div
    id="mobile-menu"
    class="gp-mobile-menu"
    [class.is-open]="isMenuOpen()"
  >
    <div class="gp-mobile-panel">
      <a href="#materiales" (click)="scrollToSection('materiales', $event)">Materiales</a>
      <a href="#servicios" (click)="scrollToSection('servicios', $event)">Servicios</a>
      <a href="#publicaciones" (click)="scrollToSection('publicaciones', $event)">Publicaciones</a>
      <a href="#contacto" (click)="scrollToSection('contacto', $event)">Contacto</a>

      <a
        [href]="whatsappUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="gp-whatsapp gp-whatsapp-mobile"
        (click)="closeMenu()"
      >
        Contactar por WhatsApp
      </a>
    </div>
  </div>
</header>
